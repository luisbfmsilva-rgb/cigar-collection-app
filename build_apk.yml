name: Build APK (TWA)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (required by Bubblewrap)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap project
        run: |
          mkdir apk-build && cd apk-build
          bubblewrap init --manifest https://${{ secrets.APP_DOMAIN }}/manifest.json --directory .
          bubblewrap init --manifest https://${{ secrets.APP_DOMAIN }}/manifest.json --directory . --jdkPath "$JAVA_HOME" --androidSdkPath "$ANDROID_SDK_ROOT"
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cigar-club-apk
          path: apk-build/*.apk
          retention-days: 30
