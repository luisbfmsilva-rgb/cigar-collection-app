name: Build APK (PWA → Android) CI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap paths
        run: |
          mkdir -p "$HOME/.bubblewrap" "$HOME/.config/bubblewrap"
          cat > "$HOME/.bubblewrap/config.json" <<EOF
          {"jdkPath":"$JAVA_HOME","androidSdkPath":"$ANDROID_SDK_ROOT"}
          EOF
          cat > "$HOME/.config/bubblewrap/config.json" <<EOF
          {"jdkPath":"$JAVA_HOME","androidSdkPath":"$ANDROID_SDK_ROOT"}
          EOF
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Initialize Bubblewrap project
        run: |
          mkdir -p apk-build && cd apk-build
          CI=true bubblewrap init --manifest https://${{ secrets.APP_DOMAIN }}/manifest.json --directory .
        env:
          CI: true
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Build APK
        run: |
          cd apk-build
          CI=true bubblewrap build --skipPwaValidation
        env:
          CI: true
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cigar-club-apk
          path: apk-build/*.apk
          retention-days: 30
