name: Build APK (PWA → Android)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap project (non-interactive)
        run: |
          mkdir apk-build && cd apk-build
          bubblewrap init \
            --manifest https://${{ secrets.APP_DOMAIN }}/manifest.json \
            --directory . \
            --jdkPath $(dirname $(dirname $(readlink -f $(which java)))) \
            --androidSdkPath $ANDROID_SDK_ROOT
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "true"

      - name: Build APK (non-interactive)
        run: |
          cd apk-build
          bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "true"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cigar-club-apk
          path: apk-build/*.apk
          retention-days: 30
