name: Build APK (TWA → Android)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    env:
      APP_URL: https://${{ secrets.APP_DOMAIN }}
      APP_NAME: Cigar Club
      APP_PACKAGE: com.cigarclub.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Clone TWA template
        run: |
          git clone --depth 1 https://github.com/GoogleChrome/android-browser-helper.git twa-template
          cp -r twa-template/demos/custom-tabs-oauth2/. apk-build/ 2>/dev/null || \
          cp -r twa-template/demos/twa-basic/. apk-build/

      - name: Configure TWA app
        run: |
          cd apk-build
          # Update package name and URL in build.gradle
          find . -name "*.gradle" -exec sed -i \
            "s|applicationId \".*\"|applicationId \"$APP_PACKAGE\"|g" {} \;
          # Update strings.xml with app URL and name
          find . -name "strings.xml" -exec sed -i \
            "s|https://.*\"|$APP_URL\"|g; s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">$APP_NAME</string>|g" {} \;

      - name: Build debug APK
        run: |
          cd apk-build
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cigar-club-debug-apk
          path: apk-build/**/*.apk
          retention-days: 30
