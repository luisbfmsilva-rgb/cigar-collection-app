name: Build APK (PWA → Android) Docker

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize TWA project with Bubblewrap Docker image
        run: |
          mkdir -p apk-build
          docker run --rm \
            -v "${PWD}/apk-build:/work" \
            -w /work \
            -e BUBBLEWRAP_SKIP_UPDATE_CHECK=true \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            init --manifest "https://${{ secrets.APP_DOMAIN }}/manifest.json" --directory .

      - name: Build APK with Bubblewrap Docker image
        run: |
          docker run --rm \
            -v "${PWD}/apk-build:/work" \
            -w /work \
            -e BUBBLEWRAP_SKIP_UPDATE_CHECK=true \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            build --skipPwaValidation

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cigar-club-apk
          path: apk-build/*.apk
          retention-days: 30
