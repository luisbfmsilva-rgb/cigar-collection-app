name: Build APK (TWA)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (required by Bubblewrap)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Install expect
        run: sudo apt-get update && sudo apt-get install -y expect

      - name: Initialize Bubblewrap project
        run: |
          mkdir apk-build && cd apk-build
          bubblewrap init --manifest https://${{ secrets.APP_DOMAIN }}/manifest.json --directory .
          expect <<'EOF'
          log_user 1
          spawn bubblewrap init --manifest https://${{ secrets.APP_DOMAIN }}/manifest.json --directory .
          expect {
            -re {Do you want Bubblewrap to install the JDK.*} {
              send "n\r"
              exp_continue
            }
            -re {Path to your existing JDK:} {
              send "$env(JAVA_HOME)\r"
              exp_continue
            }
            -re {Do you want Bubblewrap to install the Android SDK.*} {
              send "n\r"
              exp_continue
            }
            -re {Path to your existing Android SDK:} {
              send "$env(ANDROID_SDK_ROOT)\r"
              exp_continue
            }
            eof
          }
          EOF
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cigar-club-apk
          path: apk-build/*.apk
          retention-days: 30
